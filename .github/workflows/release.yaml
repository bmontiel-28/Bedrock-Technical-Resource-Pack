name: Release Resource Pack

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de la release (ej: v0.3.0)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag name
        id: get_tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create .mcpack file
        id: create_mcpack
        run: |
          MCPACK_NAME="Bedrock-Technical-Resource-Pack-${{ steps.get_tag.outputs.tag }}.mcpack"
          zip -r "$MCPACK_NAME" ./* \
            -x "*.git*" \
            -x ".github/*" \
            -x "*.md" \
            -x "LICENSE" \
            -x "documentation pictures/*"
          echo "mcpack_path=$MCPACK_NAME" >> $GITHUB_OUTPUT

      - name: Upload .mcpack to release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const tag = '${{ steps.get_tag.outputs.tag }}';
            const mcpackPath = '${{ steps.create_mcpack.outputs.mcpack_path }}';
            const mcpackData = fs.readFileSync(mcpackPath);

            let releaseId;
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              });
              releaseId = existing.id;

              // Borrar todos los assets subidos (zip/tar de GitHub no aparecen aquí)
              const { data: assets } = await github.rest.repos.listReleaseAssets({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                per_page: 100
              });
              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                });
              }
            } catch (e) {
              const { data: created } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Release ${tag}`,
                generate_release_notes: true
              });
              releaseId = created.id;
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: mcpackPath,
              data: mcpackData
            });
