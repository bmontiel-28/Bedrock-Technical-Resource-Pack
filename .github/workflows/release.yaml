name: Release Resource Pack

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create .mcpack file
        id: create_mcpack
        run: |
          MCPACK_NAME="Bedrock-Technical-Resource-Pack-v${{ steps.get_version.outputs.version }}.mcpack"
          zip -r "$MCPACK_NAME" ./* \
            -x "*.git*" \
            -x ".github/*" \
            -x "*.md" \
            -x "LICENSE" \
            -x "documentation pictures/*"
          echo "mcpack_path=$MCPACK_NAME" >> $GITHUB_OUTPUT

      - name: Upload .mcpack to release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const mcpackPath = '${{ steps.create_mcpack.outputs.mcpack_path }}';
            const mcpackData = fs.readFileSync(mcpackPath);

            // Get existing release or create a new one
            let releaseId;
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: context.ref.replace('refs/tags/', '')
              });
              releaseId = existing.id;
            } catch {
              const { data: created } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: context.ref.replace('refs/tags/', ''),
                name: 'Release v${{ steps.get_version.outputs.version }}',
                generate_release_notes: true
              });
              releaseId = created.id;
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: mcpackPath,
              data: mcpackData
            });
